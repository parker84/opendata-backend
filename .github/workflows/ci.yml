name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Unit tests
        run: pytest

      - name: End-to-end on the toy fixture
        run: |
          opendata init  --yes --path examples/toy
          opendata verify      --path examples/toy   # golden regression gate
          opendata eval        --path examples/toy   # answer-accuracy gate
